name: Dorar Tafseer Scraper

on:
  workflow_dispatch:
    inputs:
      test_surahs:
        description: 'عدد السور للاختبار (اتركه فارغاً للكل)'
        required: false
        default: 'None'

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper
        run: python dorar_tafseer.py
        env:
          TEST_SURAHS: ${{ github.event.inputs.test_surahs || 'None' }}

      - name: Verify output
        run: |
          if [ ! -d "dorar_tafseer" ] || [ -z "$(ls -A dorar_tafseer)" ]; then
            echo "ERROR: dorar_tafseer مفقود أو فارغ"
            ls -la
            exit 1
          fi
          COUNT=$(ls dorar_tafseer/ | wc -l)
          SIZE=$(du -sh dorar_tafseer/ | cut -f1)
          echo "✔ عدد الملفات: $COUNT | الحجم: $SIZE"
          echo "── عينة من الحواشي ──"
          grep -h "^\[\^" dorar_tafseer/*.md | head -20 || echo "لا حواشي"

      - name: Compress results
        run: zip -r dorar_tafseer.zip dorar_tafseer/

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dorar_tafseer.zip
          git diff --cached --quiet || git commit -m "update: tafseer $(date +'%Y-%m-%d') | $(ls dorar_tafseer/ | wc -l) سور"
          git push --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
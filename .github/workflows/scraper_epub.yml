name: Scrape Tafseer EPUB

on:
  workflow_dispatch:
    inputs:
      test_surahs:
        description: 'عدد السور للاختبار (اتركه فارغاً للكل)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 ebooklib

      - name: Run scraper
        env:
          TEST_SURAHS: ${{ github.event.inputs.test_surahs || 'None' }}
        run: |
          python scraper_epub.py
          echo "exit_code=$?" >> $GITHUB_ENV

      - name: Check output
        run: |
          echo "=== محتوى مجلد المخرجات ==="
          ls -lah dorar_tafseer_epub/ 2>/dev/null || echo "المجلد غير موجود"
          echo "=== حجم الملف ==="
          du -sh dorar_tafseer_epub/*.epub 2>/dev/null || echo "لا يوجد EPUB"

      - name: Check output
        run: |
          echo "=== محتوى المجلد ==="
          ls -lah dorar_tafseer_epub/ 2>/dev/null || echo "المجلد غير موجود"
          echo "=== أسماء الملفات hex ==="
          ls dorar_tafseer_epub/ | xxd | head -20

      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          EPUB=$(ls dorar_tafseer_epub/*.epub 2>/dev/null | head -1)
          if [ -n "$EPUB" ]; then
            git add dorar_tafseer_epub/
            git diff --cached --quiet && echo "لا تغييرات للـ commit" || (
              git commit -m "update: تحديث ملف EPUB"
              git pull origin main --no-rebase -X ours
              git push
            )
          else
            echo "⚠️ لا يوجد ملف epub في المجلد"
            exit 1
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}